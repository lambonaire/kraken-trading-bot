symbol: PF_DOGEUSD
direction: long

entry:
  margin_fraction: 0.10
  min_usd_size: 5
  min_size: 1
  size_step: 1

max_level: 4

reentry:
  - level: 1
    drop_pct: 0.008
    size_multiplier: 2.0
    take_profit_pct: 0.0025

  - level: 2
    drop_pct: 0.016
    size_multiplier: 2.5
    take_profit_pct: 0.003

  - level: 3
    drop_pct: 0.07
    size_multiplier: 1.2
    take_profit_pct: 0.005

  - level: 4
    drop_pct: 0.17
    size_multiplier: 1.3
    take_profit_pct: 0.006

rules:
  exit_on_take_profit: true
  cancel_opposite_orders: true
